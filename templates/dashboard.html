<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分析儀表板 | AI 法律諮詢助理</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <div>
                <h2 style="font-size: 1.8rem;">歡迎回來, {{ username }}</h2>
                <p style="color: var(--text-dim);">開始您的法律文件 AI 比對分析</p>
            </div>
            <a href="{{ url_for('logout') }}" style="color: var(--text-dim); text-decoration: none;">
                <i class="fas fa-sign-out-alt"></i> 登出
            </a>
        </header>

        <div class="main-grid">
            <!-- Left: Document Editor -->
            <div class="editor-section glass-panel">
                <div class="panel-header">
                    <h3><i class="fas fa-file-contract" style="color: var(--accent);"></i> 專案文件內容</h3>
                    <span class="status-badge badge-blue">編輯中</span>
                </div>
                <textarea id="doc-content" placeholder="請在此貼上或輸入您的法律文件內容、起訴狀或專案計畫書..."></textarea>
                <div style="padding: 20px; border-top: 1px solid var(--glass-border);">
                    <button id="analyze-btn" class="btn-primary">
                        <i class="fas fa-magic"></i> 開始 AI 比對分析
                    </button>
                </div>
            </div>

            <!-- Right: AI Analysis -->
            <div class="analysis-section glass-panel">
                <div class="panel-header">
                    <h3><i class="fas fa-microchip" style="color: var(--accent);"></i> AI 分析結果</h3>
                    <span id="analysis-status" class="status-badge badge-gold">等待輸入</span>
                </div>
                <div class="result-area" id="result-area">
                    <div id="welcome-message" style="text-align: center; margin-top: 50px; color: var(--text-dim);">
                        <i class="fas fa-brain" style="font-size: 3rem; margin-bottom: 20px; opacity: 0.5;"></i>
                        <p>請在左側輸入內容並點擊「開始分析」<br>系統將比對法務部相關數據並提供專業建議</p>
                    </div>
                    
                    <div id="loading-spinner" class="hidden" style="text-align: center; margin-top: 50px;">
                        <span class="loader"></span>
                        <p style="margin-top: 15px; color: var(--accent);">AI 正在檢索法務部資料庫並比對中...</p>
                    </div>

                    <div id="results-content" class="hidden">
                        <!-- Content will be injected by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
